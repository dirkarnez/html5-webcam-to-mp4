<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height">
    
    <base href="/html5-webcam-to-mp4/">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container-fluid p-5">
      <div class="row">
        <div class="col">
            <a href="https://github.com/dirkarnez/html5-webcam-to-mp4" target="_blank">dirkarnez/html5-webcam-to-mp4</a><br>
        </div>
      </div>
      <div class="row">
        <div class="col">
            <video id="preview"></video>
        </div>
      </div>
      <div class="row">
        <div class="col">
            <button type="button" class="btn btn-primary" onclick="startRecording()">Start Recording</button>
            <button type="button" class="btn btn-primary" onclick="stopRecording()">Stop Recording</button>
        </div>
      </div>
    </div>
    
    <script>
        let mediaRecorder;
        let recordedBlobs;
        const videoElement = document.getElementById("preview");
        
        // 1. Get user media and start preview
        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            
            // Check if MP4 is supported, otherwise fallback might be necessary (e.g., 'video/webm')
            const options = { mimeType: 'video/mp4' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                console.error(`${options.mimeType} is not Supported`);
                // Use an alternative, check supported types or use 'video/webm' which has wide support
                return; 
            }
    
            // 2. Initialize MediaRecorder
            recordedBlobs = [];
            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch (err) {
                console.error('Exception while creating MediaRecorder:', err);
                return;
            }
    
            // 3. Gather data chunks
            mediaRecorder.ondataavailable = handleDataAvailable;
            mediaRecorder.start();
    
            // Display stream in a <video> element on the page for preview
            videoElement.srcObject = stream;
            videoElement.play();
        }
    
        function handleDataAvailable(event) {
            if (event.data && event.data.size > 0) {
                recordedBlobs.push(event.data);
            }
        }
    
        // 4. Stop recording and save/download
        function stopRecording() {
            mediaRecorder.stop();
            mediaRecorder.onstop = () => {
                const superBuffer = new Blob(recordedBlobs, { type: 'video/mp4' });
                //form submit
                const url = window.URL.createObjectURL(superBuffer);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'webcam-recording.mp4'; // Specify filename with mp4 extension
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
                
                if (videoElement.srcObject) {
                    videoElement.srcObject.getTracks().forEach((track) => track.stop());
                    videoElement.srcObject = null;
                }
            };
        }
        </script>
</body>
</html>
